<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title or '注册' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-header">
        <h1>注册账号</h1>
        <p>用户名 + 密码即可。管理员账号由系统配置里的管理员名单决定。</p>
      </div>

      {% if error %}
      <div class="flash flash-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/auth/register" class="form-panel">
        <input type="hidden" name="next" value="{{ next or '/learning' }}">
        <div class="field">
          <label>用户名</label>
          <input name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" name="password" autocomplete="new-password" required>
        </div>
        <div class="field">
          <label>确认密码</label>
          <input type="password" name="confirm_password" autocomplete="new-password" required>
        </div>
        <div class="actions auth-actions">
          <button class="button" type="submit">创建账号</button>
          <a class="button button-ghost" href="/login{% if next %}?next={{ next | urlencode }}{% endif %}">返回登录</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
